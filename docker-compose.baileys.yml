services:
  baileys:
    build:
      context: ./baileys-service
      dockerfile: Dockerfile
    container_name: mimotes-baileys
    ports:
      - "3002:3002"
    volumes:
      - baileys_data:/app/data
    environment:
      - BAILEYS_PORT=3002
      - BAILEYS_API_KEY=${BAILEYS_API_KEY:-baileys-secret-key}
      - BAILEYS_WEBHOOK_URL=http://app:3000/api/whatsapp/baileys/incoming
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  baileys_data:
